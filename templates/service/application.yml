server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: {{service-name}}
  threads:
    virtual:
      enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          fetch_size: 100
        order_inserts: true
        order_updates: true
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 5000
      max-lifetime: 600000
      leak-detection-threshold: 30000
  kafka:
    producer:
      properties:
        enable.idempotence: true
        acks: all
        compression.type: snappy
    consumer:
      properties:
        isolation.level: read_committed
        auto.offset.reset: earliest
        enable.auto.commit: false
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  group-configs:
    - group: v1
      paths-to-match: /api/v1/**
    - group: v2
      paths-to-match: /api/v2/**

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slas:
        http.server.requests: 10ms, 50ms, 100ms, 200ms, 500ms, 1s, 2s
  info:
    env:
      enabled: true
  otlp:
    tracing:
      endpoint: http://${OTEL_EXPORTER_OTLP_ENDPOINT:localhost:4318}

logging:
  config: classpath:logback-spring.xml
  level:
    com.example: DEBUG
    org.springframework: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.apache.kafka: WARN

---
spring:
  config:
    activate:
      on-profile: local

server:
  port: 8080

spring:
  jpa:
    show-sql: true
  datasource:
    hikari:
      maximum-pool-size: 5
  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    com.example: DEBUG
    org.springframework.web: DEBUG

---
spring:
  config:
    activate:
      on-profile: test

spring:
  datasource:
    url: jdbc:tc:postgresql:17:///{{service-name}}
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: create-drop
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

logging:
  level:
    com.example: DEBUG
